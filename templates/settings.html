{% extends "base.html" %}

{% block title %}Configurações - Revolution Pay{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-gear"></i> Configurações da Conta</h4>
            </div>
            <div class="card-body">
                <form method="post" action="/settings">
                    <div class="mb-3">
                        <label class="form-label">Chave Pix</label>
                        <input type="text" name="pix_key" class="form-control" value="{{ user.pix_key }}" placeholder="Digite sua chave Pix">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="{{ user.email }}" disabled>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
