<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Revolution Pay{% endblock %}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            min-height: 100vh;
        }

        /* Navbar preta */
        .navbar-modern {
            background: #000000;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(255, 165, 0, 0.2);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: #FF8C00 !important;
        }

        .navbar-brand i {
            color: #FF8C00;
        }

        .nav-link {
            font-weight: 500;
            color: #ffffff !important;
            margin: 0 0.5rem;
            transition: all 0.3s;
            position: relative;
        }

        .nav-link:hover {
            color: #FF8C00 !important;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #FF8C00;
            transition: width 0.3s;
        }

        .nav-link:hover::after {
            width: 80%;
        }

        /* Botão do Discord AZUL */
        .discord-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        .discord-btn:hover {
            background: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
            color: white;
        }

        .discord-btn i {
            font-size: 1.2rem;
        }

        /* Menu lateral preto com laranja */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: #111111;
            backdrop-filter: blur(10px);
            box-shadow: 2px 0 20px rgba(255, 140, 0, 0.2);
            transition: left 0.3s ease;
            z-index: 1050;
            padding: 80px 0 20px;
            border-right: 1px solid #FF8C00;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
        }

        .sidebar-menu li {
            margin: 5px 15px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .sidebar-menu a:hover {
            background: #FF8C00;
            color: #000000;
            transform: translateX(5px);
        }

        .sidebar-menu a i {
            font-size: 1.2rem;
            color: #FF8C00;
        }

        .sidebar-menu a:hover i {
            color: #000000;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(3px);
            z-index: 1040;
            display: none;
        }

        .menu-overlay.active {
            display: block;
        }

        /* Botão do menu laranja */
        .menu-toggle {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #FF8C00;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: rgba(255, 140, 0, 0.1);
        }

        .menu-toggle:hover {
            background: rgba(255, 140, 0, 0.2);
            transform: scale(1.05);
        }

        /* Cards modernos com tema laranja/preto */
        .card-modern {
            background: #111111;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(255, 140, 0, 0.1);
            transition: all 0.3s;
            border: 1px solid #FF8C00;
            height: 100%;
            color: #ffffff;
        }

        .card-modern:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(255, 140, 0, 0.3);
        }

        .gradient-bg {
            background: #FF8C00;
            color: #000000;
            border: none;
        }

        .gradient-bg h2, .gradient-bg p {
            color: #000000;
        }

        /* Main content */
        .main-content {
            transition: margin-left 0.3s;
            min-height: 100vh;
            padding: 80px 20px 20px;
        }

        .main-content.shifted {
            margin-left: 280px;
        }

        /* Botões modernos */
        .btn-modern {
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-primary-modern {
            background: #FF8C00;
            color: #000000;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.4);
        }

            box-shadow: 0 6px 20px rgba(255, 140, 0,
