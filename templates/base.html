<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Revolution Pay{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        #sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background: #343a40;
            color: white;
            transition: 0.3s;
            z-index: 1000;
            padding-top: 60px;
        }
        #sidebar.active { left: 0; }
        #sidebar a {
            padding: 10px 15px;
            display: block;
            color: #ddd;
            text-decoration: none;
        }
        #sidebar a:hover { background: #007bff; color: white; }
        #content {
            margin-left: 0;
            transition: 0.3s;
            padding: 20px;
        }
        #content.shifted { margin-left: 250px; }
        .menu-toggle {
            font-size: 1.8rem;
            cursor: pointer;
            color: #007bff;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar">
        <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/deposit"><i class="bi bi-qr-code"></i> Depositar</a>
        <a href="/withdraw"><i class="bi bi-cash"></i> Sacar</a>
        <a href="/transfer"><i class="bi bi-send"></i> Transferir</a>
        <a href="/history"><i class="bi bi-clock-history"></i> Histórico</a>
        <a href="/settings"><i class="bi bi-gear"></i> Configurações</a>
        <a href="/logout"><i class="bi bi-box-arrow-right"></i> Sair</a>
    </div>

    <!-- Conteúdo -->
    <div id="content">
        <nav class="navbar navbar-light bg-light mb-4">
            <div class="container-fluid">
                <span class="menu-toggle" onclick="toggleMenu()">☰</span>
                <span class="navbar-text">{{ user_email }}</span>
            </div>
        </nav>
        {% block content %}{% endblock %}
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('content').classList.toggle('shifted');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
