<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Revolution Pay{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .menu { position: fixed; top: 0; left: 0; width: 200px; height: 100%; background: #333; padding: 20px; display: none; }
        .menu.active { display: block; }
        .menu a { color: white; display: block; padding: 10px; text-decoration: none; }
        .menu a:hover { background: #555; }
        .content { margin-left: 0; }
        .content.shifted { margin-left: 200px; }
        .menu-toggle { font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="menu" id="sidebar">
        <a href="/dashboard">Dashboard</a>
        <a href="/deposit">Depositar</a>
        <a href="/withdraw">Sacar</a>
        <a href="/transfer">Transferir</a>
        <a href="/history">Histórico</a>
        <a href="/settings">Configurações</a>
        <a href="/logout">Sair</a>
    </div>

    <div class="content" id="content">
        <span class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('active'); document.getElementById('content').classList.toggle('shifted');">☰</span>
        <h2>Bem-vindo, {{ user_email }}</h2>
        <hr>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
