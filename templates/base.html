<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Revolution Pay{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
        }
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            background: #343a40;
            color: #fff;
            transition: all 0.3s;
            position: fixed;
            height: 100vh;
            z-index: 999;
            left: -250px;
        }
        #sidebar.active {
            left: 0;
        }
        #sidebar .sidebar-header {
            padding: 20px;
            background: #007bff;
        }
        #sidebar ul.components {
            padding: 20px 0;
            border-bottom: 1px solid #47748b;
        }
        #sidebar ul li a {
            padding: 10px 20px;
            font-size: 1.1em;
            display: block;
            color: #ddd;
            text-decoration: none;
            cursor: pointer;
        }
        #sidebar ul li a:hover {
            color: #fff;
            background: #007bff;
        }
        #sidebar ul li.active > a {
            color: #fff;
            background: #007bff;
        }
        ul ul a {
            font-size: 0.9em !important;
            padding-left: 30px !important;
            background: #2c3136;
        }
        #content {
            width: 100%;
            padding: 20px;
            min-height: 100vh;
            transition: all 0.3s;
        }
        #content.shifted {
            margin-left: 250px;
        }
        .navbar {
            padding: 15px 10px;
            background: #fff;
            border: none;
            border-radius: 0;
            margin-bottom: 20px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }
        .menu-toggle {
            font-size: 1.5rem;
            cursor: pointer;
            color: #007bff;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <h3><i class="bi bi-bolt"></i> Revolution Pay</h3>
            </div>
            <ul class="list-unstyled components">
                <li>
                    <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
                </li>
                <li>
                    <a href="#transferSubmenu" data-bs-toggle="collapse" aria-expanded="false" class="dropdown-toggle">
                        <i class="bi bi-arrow-left-right"></i> Transferências
                    </a>
                    <ul class="collapse list-unstyled" id="transferSubmenu">
                        <li><a href="/deposit"><i class="bi bi-qr-code"></i> Depositar</a></li>
                        <li><a href="/withdraw"><i class="bi bi-cash"></i> Sacar</a></li>
                        <li><a href="/transfer"><i class="bi bi-send"></i> Transferir</a></li>
                    </ul>
                </li>
                <li>
                    <a href="/history"><i class="bi bi-clock-history"></i> Transações</a>
                </li>
                <li>
                    <a href="/settings"><i class="bi bi-gear"></i> Configurações</a>
                </li>
                <li>
                    <a href="/logout"><i class="bi bi-box-arrow-right"></i> Sair</a>
                </li>
            </ul>
        </nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg">
                <div class="container-fluid">
                    <span class="menu-toggle" id="sidebarCollapse">
                        <i class="bi bi-list"></i>
                    </span>
                    <div class="ms-auto">
                        <span class="text-muted"><i class="bi bi-person-circle"></i> {{ user_email }}</span>
                    </div>
                </div>
            </nav>

            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarCollapse').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('content').classList.toggle('shifted');
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
