{% extends "base.html" %}

{% block title %}Depósito - Revolution Pay{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="bi bi-qr-code"></i> Solicitar depósito via Pix</h4>
            </div>
            <div class="card-body">
                <form method="post" action="/deposit">
                    <div class="mb-3">
                        <label class="form-label">Valor (em centavos)</label>
                        <input type="number" name="amount" class="form-control" placeholder="Ex: 1000 = R$ 10,00" required>
                        <div class="form-text">Digite o valor em centavos (ex: 1000 = R$ 10,00).</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-qr-code"></i> Gerar QR Code
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
