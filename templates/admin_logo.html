<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Revolution Pay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .admin-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .admin-title {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .admin-subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn-admin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn-admin:hover {
            transform: translateY(-2px);
            color: white;
        }
        .erro {
            color: #dc3545;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2 class="admin-title">🔐 Painel Administrativo</h2>
        <p class="admin-subtitle">Acesso restrito - apenas para desenvolvedores</p>
        
        <form method="post" action="/admin-painel-9f3k2d">
            <div class="mb-4">
                <label for="senha" class="form-label">Senha de acesso</label>
                <input type="password" class="form-control" id="senha" name="senha" required 
                       placeholder="Digite a senha secreta">
            </div>
            <button type="submit" class="btn btn-admin w-100">Acessar Painel</button>
            
            {% if erro %}
            <div class="erro">{{ erro }}</div>
            {% endif %}
        </form>
        
        <div class="text-center mt-4">
            <a href="/" class="text-muted" style="font-size: 12px;">← Voltar ao site</a>
        </div>
    </div>
</body>
</html>
