{% extends "base.html" %}

{% block title %}Acesso Administrativo{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100" style="margin-top: -80px;">
    <div class="col-md-5">
        <div class="card-modern p-4" style="border-color: #FF8C00; border-width: 2px;">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock display-1" style="color: #FF8C00;"></i>
                <h2 class="fw-bold" style="color: #FF8C00;">Painel Administrativo</h2>
                <p class="text-muted">Área restrita - apenas para administradores</p>
            </div>
            
            {% if erro %}
            <div class="alert alert-danger d-flex align-items-center gap-2 mb-4">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <div><strong>Erro!</strong> {{ erro }}</div>
            </div>
            {% endif %}
            
            <form method="post" action="/admin-painel">
                <div class="mb-4">
                    <label class="form-label">Senha de acesso</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-key" style="color: #FF8C00;"></i></span>
                        <input type="password" name="senha" class="form-control" required autofocus>
                    </div>
                    <div class="form-text">Digite a senha secreta de administrador</div>
                </div>
                
                <button type="submit" class="btn btn-primary-modern w-100 py-3">
                    <i class="bi bi-box-arrow-in-right"></i> Acessar Painel
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
