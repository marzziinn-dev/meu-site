<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Revolution Pay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .btn-admin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-admin:hover {
            transform: translateY(-2px);
            color: white;
        }
        .erro {
            color: #dc3545;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2 class="text-center mb-4">🔐 Painel Admin</h2>
        <p class="text-muted text-center mb-4">Acesso restrito - desenvolvedores</p>
        
        <form method="post">
            <div class="mb-3">
                <label for="senha" class="form-label">Senha de acesso</label>
                <input type="password" class="form-control" id="senha" name="senha" required>
            </div>
            <button type="submit" class="btn-admin">Acessar Painel</button>
            
            {% if erro %}
            <div class="erro">{{ erro }}</div>
            {% endif %}
        </form>
        
        <div class="text-center mt-3">
            <a href="/" class="text-muted small">← Voltar ao site</a>
        </div>
    </div>
</body>
</html>
