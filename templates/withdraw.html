{% extends "base.html" %}
{% block title %}Saque{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <i class="bi bi-cash"></i> Solicitar saque
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle"></i>
                    Saldo disponível: <strong>R$ {{ "%.2f"|format(available) }}</strong>
                </div>
                
                <form method="post" action="/withdraw">
                    <div class="mb-3">
                        <label class="form-label">Valor do saque (em centavos)</label>
                        <input type="number" name="amount" class="form-control" 
                               placeholder="Ex: 1000 = R$ 10,00" 
                               min="1" max="{{ available * 100 }}" required>
                        <div class="form-text">Digite o valor em centavos (máx: {{ "%.2f"|format(available) }})</div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Chave Pix</label>
                        <input type="text" name="pix_key" class="form-control" 
                               value="{{ pix_key }}" required>
                        <div class="form-text">Sua chave Pix (CPF, email, telefone ou aleatória)</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-send"></i> Solicitar saque
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
