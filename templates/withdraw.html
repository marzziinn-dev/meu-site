{% extends "base.html" %}

{% block title %}Saque - Revolution Pay{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="fas fa-money-bill-wave me-2 text-primary"></i>Solicitar saque via Pix</h4>
            </div>
            <div class="card-body">
                <form method="post" action="/withdraw">
                    <div class="mb-3">
                        <label class="form-label">Valor (em centavos)</label>
                        <input type="number" name="amount" class="form-control" placeholder="Ex: 1000 = R$ 10,00" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Chave Pix</label>
                        <input type="text" name="pix_key" class="form-control" value="{{ pix_key }}" required>
                        <div class="form-text">Se já tiver uma chave salva, ela aparecerá acima.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-paper-plane"></i> Solicitar saque
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
