{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100" style="margin-top: -80px;">
    <div class="col-md-5">
        <div class="card-modern p-4">
            <div class="text-center mb-4">
                <i class="bi bi-bolt display-1" style="color: #FF8C00;"></i>
                <h2 class="fw-bold" style="color: #FF8C00;">Bem-vindo de volta!</h2>
                <p class="text-muted">Faça login para acessar sua conta</p>
            </div>
            
            <!-- Mensagem de erro -->
            {% if erro %}
            <div class="alert alert-danger d-flex align-items-center gap-2 mb-4">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <div>
                    <strong>Erro!</strong> {{ erro }}
                </div>
            </div>
            {% endif %}
            
            <form method="post" action="/login">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-envelope" style="color: #FF8C00;"></i></span>
                        <input type="email" name="email" class="form-control" value="{{ email }}" required autofocus>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-lock" style="color: #FF8C00;"></i></span>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-modern w-100 py-3 mb-3">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </button>
                
                <div class="text-center">
                    <span class="text-muted">Não tem conta?</span>
                    <a href="/register" style="color: #FF8C00; font-weight: 600;">Registre-se</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
