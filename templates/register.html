{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100" style="margin-top: -80px;">
    <div class="col-md-6">
        <div class="card-modern p-4">
            <div class="text-center mb-4">
                <i class="bi bi-bolt display-1" style="color: #FF8C00;"></i>
                <h2 class="fw-bold" style="color: #FF8C00;">Criar Conta</h2>
                <p class="text-muted">Preencha seus dados para começar</p>
            </div>
            
            <form method="post" action="/register">
                <!-- Nome Completo -->
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-person" style="color: #FF8C00;"></i></span>
                        <input type="text" name="nome_completo" class="form-control" required autofocus>
                    </div>
                </div>

                <!-- CPF -->
                <div class="mb-3">
                    <label class="form-label">CPF</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-credit-card" style="color: #FF8C00;"></i></span>
                        <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-envelope" style="color: #FF8C00;"></i></span>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                </div>
                
                <!-- Senha -->
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-lock" style="color: #FF8C00;"></i></span>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-modern w-100 py-3 mb-3">
                    <i class="bi bi-check-circle"></i> Criar conta
                </button>
                
                <div class="text-center">
                    <span class="text-muted">Já tem conta?</span>
                    <a href="/" style="color: #FF8C00; font-weight: 600;">Faça login</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
