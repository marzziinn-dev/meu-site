{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100" style="margin-top: -80px;">
    <div class="col-md-5">
        <div class="card-modern p-4">
            <div class="text-center mb-4">
                <i class="bi bi-bolt display-1 text-primary"></i>
                <h2 class="fw-bold">Criar Conta</h2>
                <p class="text-muted">Comece a usar Revolution Pay hoje!</p>
            </div>
            
            <form method="post" action="/register">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-modern w-100 py-3 mb-3">
                    <i class="bi bi-check-circle"></i> Registrar
                </button>
                
                <div class="text-center">
                    <span class="text-muted">Já tem conta?</span>
                    <a href="/" class="text-primary fw-bold">Faça login</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
