{% extends "base.html" %}

{% block title %}Transferir - Revolution Pay{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-send"></i> Transferir Saldo</h4>
            </div>
            <div class="card-body">
                <form method="post" action="/transfer">
                    <div class="mb-3">
                        <label class="form-label">Email do Destinatário</label>
                        <input type="email" name="dest_email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Valor (em centavos)</label>
                        <input type="number" name="amount" class="form-control" placeholder="Ex: 1000 = R$ 10,00" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Transferir</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
