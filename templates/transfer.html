{% extends "base.html" %}
{% block title %}Transferir{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">Transferir saldo</div>
            <div class="card-body">
                <form method="post" action="/transfer">
                    <div class="mb-3">
                        <label class="form-label">E-mail do destinatário</label>
                        <input type="email" name="dest_email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Valor (centavos)</label>
                        <input type="number" name="amount" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Transferir</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
